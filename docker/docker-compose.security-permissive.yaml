# Default runtime: drop host-relevant caps; restore guest-admin caps for c0 root / apt.
# Moby seccomp + no-new-privileges. sshd on 2222 as dev (no setuid).
services:
  c0dev:
    privileged: false
    security_opt:
      - seccomp:seccomp/moby-default-seccomp.json
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - DAC_OVERRIDE
      - CHOWN
      - FOWNER
