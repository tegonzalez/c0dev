#version: "3.8"

x-environment-base: &env-base
  OLLAMA_HOST: http://host.docker.internal:11434
  LLM_PROVIDER: ollama
  OLLAMA_MODEL: gpt-oss:20b
  TERM: ${TERM}
  # Shared tools prefix (symlinked to ~/.cargo etc. by entrypoint)
  TOOLS_PREFIX: ${TOOLS_PREFIX:-/tools/opt/default}

services:
  c0dev:
    build:
      context: .
      dockerfile: Dockerfile
    hostname: ${C0DEV_HOSTNAME:-c0dev}
    ports:
      - "${C0DEV_WEB_PORT:-3000}:3000"
    working_dir: /home/dev
    tty: true
    environment:
      <<: *env-base
    entrypoint:
      - /usr/local/bin/docker-entrypoint.sh
    extra_hosts:
      - "host.docker.internal:host-gateway"
    labels:
      c0dev.tools_hash: ${DOCKERFILE_HASH}
      c0dev.tools_volume: ${SHARED_TOOLS_VOLUME}
      c0dev.project: ${C0DEV_HOSTNAME}
