# Strict runtime label for Codex/Cursor (c0 start --cap-drop-all).
# Same cap/seccomp profile as permissive; mode is recorded on the container label only.
services:
  c0dev:
    privileged: false
    security_opt:
      - seccomp:seccomp/moby-default-seccomp.json
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - DAC_OVERRIDE
      - CHOWN
      - FOWNER
